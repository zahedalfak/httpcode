<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Status Codes - Global Reference</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>HTTP Status Codes</h1>
            <p>Comprehensive reference for developers in 14+ languages</p>
            <div class="controls">
                <input type="text" id="search" placeholder="Search by code or keyword...">
                <select id="lang-select">
                    <option value="en">English (EN)</option>
                    <option value="fa">Persian (FA)</option>
                    <option value="ar">Arabic (AR)</option>
                    <option value="zh">Chinese (ZH)</option>
                    <option value="es">Spanish (ES)</option>
                    <option value="fr">French (FR)</option>
                    <option value="de">German (DE)</option>
                    <option value="ja">Japanese (JA)</option>
                    <option value="ru">Russian (RU)</option>
                    <option value="pt">Portuguese (PT)</option>
                    <option value="tr">Turkish (TR)</option>
                    <option value="hi">Hindi (HI)</option>
                    <option value="it">Italian (IT)</option>
                    <option value="ko">Korean (KO)</option>
                    <option value="vi">Vietnamese (VI)</option>
                    <option value="nl">Dutch (NL)</option>
                    <option value="pl">Polish (PL)</option>
                    <option value="id">Indonesian (ID)</option>
                    <option value="th">Thai (TH)</option>
                    <option value="el">Greek (EL)</option>
                    <option value="sv">Swedish (SV)</option>
                    <option value="ro">Romanian (RO)</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="results" class="grid">
            <!-- Codes will be rendered here -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 HTTP Status Codes Project. MIT Licensed.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
